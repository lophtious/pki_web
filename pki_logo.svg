<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.5" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>
  
  <!-- Outer translucent ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.25"/>
  
  <!-- Central hexagon nodes -->
  <g opacity="0.7">
    <!-- Top node -->
    <circle cx="24" cy="10" r="2.5" fill="#0f766e" opacity="0.8"/>
    <circle cx="24" cy="10" r="3.5" fill="#0f766e" opacity="0.2"/>
    
    <!-- Bottom-left node -->
    <circle cx="13" cy="30" r="2.5" fill="#2563eb" opacity="0.8"/>
    <circle cx="13" cy="30" r="3.5" fill="#2563eb" opacity="0.2"/>
    
    <!-- Bottom-right node -->
    <circle cx="35" cy="30" r="2.5" fill="#0f766e" opacity="0.8"/>
    <circle cx="35" cy="30" r="3.5" fill="#0f766e" opacity="0.2"/>
  </g>
  
  <!-- Connecting lines (hexagon) -->
  <line x1="24" y1="10" x2="35" y2="30" stroke="url(#grad1)" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="24" y1="10" x2="13" y2="30" stroke="url(#grad2)" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="13" y1="30" x2="35" y2="30" stroke="url(#grad1)" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>
  
  <!-- Central key/lock shape -->
  <g opacity="0.8">
    <!-- Key head (circle with gradient) -->
    <circle cx="24" cy="20" r="3" fill="url(#grad1)" opacity="0.6"/>
    <circle cx="24" cy="20" r="3" fill="none" stroke="#0f766e" stroke-width="0.8" opacity="0.8"/>
    
    <!-- Key shaft -->
    <rect x="26" y="19" width="6" height="2" fill="url(#grad2)" opacity="0.5" rx="1"/>
    
    <!-- Key teeth -->
    <rect x="32" y="19.5" width="1" height="1" fill="#2563eb" opacity="0.7"/>
    <rect x="32" y="20.5" width="1" height="1" fill="#0f766e" opacity="0.6"/>
  </g>
  
  <!-- Digital pulse dots (security elements) -->
  <g opacity="0.5">
    <circle cx="18" cy="15" r="1" fill="#0f766e"/>
    <circle cx="30" cy="26" r="1" fill="#2563eb"/>
    <circle cx="20" cy="28" r="0.8" fill="#0f766e"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#0f766e" stroke-width="0.5" opacity="0.15" filter="url(#blur)"/>
</svg>
